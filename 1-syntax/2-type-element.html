<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .inline{
            width: 200px;
            height: 200px;
            background-color: blue;
        }
        .block{
            width: 200px;
            height: 200px;
            background-color: purple;
        }
        .inline2{
            width: 150px;
            height: 150px;
            background-color: blueviolet;
        }
        .block2{
            width: 100px;
            height: 100px;
            background-color: darkmagenta;
        }
        
    

    
    </style> 
</head>
<body>
  <!-- Inline vs Block Element   -->
   <span class="inline">luk ma</span>
   <span class="inline2">Inline 2</span>
   <span class="block2">Inline 2</span>
   <span>Inline 3</span>
   <span>Inline 4</span>
   <!-- Block Element -->
    <P class="block">Paragraph 1</P>
    <span class="block2">luk tnam</span>
    <P class="inline2">paragraph 2</P>



</body>
</html>
